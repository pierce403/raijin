<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>raijin.sh session</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script type="module" src="/src/frontend/session.js"></script>
  </head>
  <body class="page page-session">
    <main class="session-screen">
      <section class="panel session-topbar">
        <div class="topbar-brand">
          <p class="eyebrow">raijin.sh</p>
          <h1>Live Session</h1>
          <p class="lede compact">
            Active shell access to the current environment.
          </p>
        </div>

        <div class="session-facts">
          <div class="fact-card">
            <span>Status</span>
            <span id="status-badge" class="status-badge status-waiting">
              waiting for browser
            </span>
          </div>
          <div class="fact-card">
            <span>Mode</span>
            <code id="mode-label">interactive</code>
          </div>
          <div class="fact-card">
            <span>Session</span>
            <code id="session-id">...</code>
          </div>
          <div class="fact-card">
            <span>Remote IP</span>
            <code id="remote-ip">pending</code>
          </div>
          <div class="fact-card fact-card-traffic">
            <span>Relay</span>
            <div class="traffic-readout">
              <span id="tx-indicator" class="traffic-indicator">tx</span>
              <code id="tx-count">0 B</code>
              <span id="rx-indicator" class="traffic-indicator">rx</span>
              <code id="rx-count">0 B</code>
            </div>
          </div>
        </div>

        <div class="topbar-actions">
          <p id="status-copy" class="status-copy">Listening for connection...</p>
          <button id="end-session" class="danger-button" type="button">
            End Session
          </button>
        </div>

        <p id="session-error" class="form-error" hidden></p>
      </section>

      <section id="bootstrap-panel" class="panel bootstrap-panel">
        <header class="panel-header compact">
          <h2>Bootstrap Command</h2>
          <p>Run this inside the Linux container or VM you control.</p>
        </header>
        <textarea
          id="bootstrap-command"
          class="command-output"
          readonly
          spellcheck="false"
        ></textarea>
        <div class="action-row">
          <button id="copy-command" class="secondary-button" type="button">
            Copy Command
          </button>
        </div>
      </section>

      <section class="terminal-stage">
        <div id="terminal" class="terminal-panel" aria-label="Live terminal"></div>
      </section>
    </main>
  </body>
</html>
